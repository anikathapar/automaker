name: Release Build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Extracted version: ${VERSION}"

      - name: Update package.json version
        shell: bash
        run: |
          node apps/ui/scripts/update-version.mjs "${{ steps.version.outputs.version }}"

      - name: Setup project
        uses: ./.github/actions/setup-project
        with:
          check-lockfile: 'true'

      - name: Build web UI and server
        run: |
          npm run build:production-web

      - name: Pack release bundle
        shell: bash
        run: |
          mkdir -p release-bundle/ui release-bundle/server
          cp -r apps/ui/dist/. release-bundle/ui/
          cp -r apps/server/dist/. release-bundle/server/
          cp apps/server/package.json release-bundle/server/
          (cd release-bundle && zip -r ../automaker-web-${{ steps.version.outputs.version }}.zip .)
          mv automaker-web-${{ steps.version.outputs.version }}.zip "$GITHUB_WORKSPACE/"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: automaker-web-${{ steps.version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
